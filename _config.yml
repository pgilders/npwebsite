# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

title: Dr Nayana Prakash
description: >- # this means to ignore newlines until "baseurl:"
  Dr Nayana Prakash is a researcher and writer working on technology, politics,
  culture, India, and the Global South.
baseurl: "" # custom domain serves this GitHub Pages project site at the domain root
url: "https://nayanaprakash.com" # the base hostname & protocol for the site
og_image: /assets/img/profile-pic.jpg
google_analytics: "UA-121636368-3"

header:
  pages:
    - name: Home
      slug: /
    - name: Research
    - name: Writing & Media
      slug: /writing-media
    - name: Teaching

footer:
  show_powered_by: true
  contact:
    - name: Email
      value: hello@nayanaprakash.com
      link: mailto:hello@nayanaprakash.com
#     - name: WeChat
#       value: YourWeChatUsername
#       link: "#"
  follow:
    - name: LinkedIn
      link: https://www.linkedin.com/in/dr-nayana-prakash-b6b12387/
    - name: X
      link: https://x.com/NayanaPrakash1
      username: "@NayanaPrakash1"
    - name: Bluesky
      link: https://bsky.app/profile/nayanaprakash.bsky.social
#     - name: Facebook
#       link: http://facebook.com/YourFacebookUsername
#     - name: GitHub
#       link: http://github.com/YourGitHubUsername
#     - name: Dribbble
#       link: https://dribbble.com/YourDribbbleUsername
#     - name: RSS
#       link: /feed.xml

# Build settings
markdown: kramdown
sass:
    style: :compressed
plugins:
  - jekyll-feed

# Excluded items
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - feed.xml
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CHANGELOG.md
  - LICENSE.md
  - README.md
  - bay_jekyll_theme-1.0.17.gem
  - bay_jekyll_theme.gemspec
  - screenshot.png

# Used for defeating caching
version: 1
